<aside class="fixed left-0 top-0 h-full w-[260px] bg-surface-container-low border-r border-outline-variant/30 flex flex-col z-50">
  <!-- Brand Logo -->
  <div class="py-8 px-6">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">medical_services</span>
      </div>
      <div>
        <h1 class="font-headline-sm text-headline-sm font-bold text-primary">Sanad</h1>
        <p class="font-label-sm text-label-sm text-on-surface-variant/70 uppercase tracking-widest">Admin Portal</p>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-4 space-y-1">
    @for (item of navItems; track item.route) {
      <a 
        [routerLink]="item.route" 
        routerLinkActive="text-primary font-bold border-l-4 border-primary bg-secondary-container/10"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-4 py-3 text-on-surface-variant font-medium hover:bg-surface-container-high transition-colors duration-200"
      >
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span class="font-label-md text-label-md">{{ item.label }}</span>
      </a>
    }

    <!-- System Section Header -->
    <div class="pt-8 pb-4 px-4">
      <p class="font-label-sm text-label-sm text-outline uppercase tracking-tighter">System</p>
    </div>

    <!-- Settings Link -->
    <a 
      routerLink="/settings" 
      routerLinkActive="text-primary font-bold border-l-4 border-primary bg-secondary-container/10"
      class="flex items-center gap-3 px-4 py-3 text-on-surface-variant font-medium hover:bg-surface-container-high transition-colors duration-200"
    >
      <span class="material-symbols-outlined">settings</span>
      <span class="font-label-md text-label-md">Settings</span>
    </a>
  </nav>

  <!-- Health Card widget -->
  <div class="p-4 mt-auto">
    <div class="bg-primary-container text-on-primary-container p-4 rounded-2xl mb-4">
      <p class="font-label-md text-label-md font-bold mb-1">System Health</p>
      <div class="w-full bg-black/10 h-1.5 rounded-full overflow-hidden">
        <div class="bg-white h-full w-[94%]"></div>
      </div>
      <p class="font-label-sm text-label-sm mt-2 opacity-80">94.2% Uptime</p>
    </div>

    <!-- Help & Logout -->
    <div class="border-t border-outline-variant/30 pt-4 space-y-1">
      <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-lg cursor-pointer">
        <span class="material-symbols-outlined">help</span>
        <span class="font-label-md text-label-md">Help Center</span>
      </a>
      <a (click)="openLogoutModal($event)" class="flex items-center gap-3 px-4 py-3 text-error hover:bg-error-container/20 transition-colors rounded-lg cursor-pointer">
        <span class="material-symbols-outlined">logout</span>
        <span class="font-label-md text-label-md">Logout</span>
      </a>
    </div>
  </div>
</aside>

<!-- Logout Confirmation Dialog -->
@if (showLogoutModal()) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm transition-all duration-300">
    <div class="bg-surface-container-lowest p-6 rounded-2xl shadow-xl max-w-md w-full border border-outline-variant/30 animate-in fade-in zoom-in-95 duration-200">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-error/10 flex items-center justify-center text-error">
          <span class="material-symbols-outlined">logout</span>
        </div>
        <h3 class="font-headline-sm text-headline-sm font-bold text-on-surface">Logout</h3>
      </div>
      <p class="font-body-md text-body-md text-on-surface-variant mb-6">
        Are you sure you want to sign out?
      </p>
      <div class="flex justify-end gap-3">
        <button 
          (click)="cancelLogout()"
          class="px-4 py-2 border border-outline rounded-lg text-primary font-label-md hover:bg-surface-container-low transition-colors"
        >
          Cancel
        </button>
        <button 
          (click)="confirmLogout()"
          class="px-4 py-2 bg-error text-white font-label-md rounded-lg hover:bg-error/90 active:scale-95 transition-all"
        >
          Logout
        </button>
      </div>
    </div>
  </div>
}
